name: Performance Testing CI

on: [push, pull_request]

jobs:
  performance-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install dependencies and start app
      run: |
        npm install
        node index.js &
        sleep 5

    - name: Run k6 Performance Test
      uses: grafana/k6-action@v2
      with:
        filename: script.js
